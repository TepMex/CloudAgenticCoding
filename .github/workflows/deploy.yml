name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Project pages are served from /<repo>/, so hashed assets must use
      # /<repo>/socratic/ — not /socratic/ (that resolves to the org/user site root).
      - name: Build
        env:
          GH_PAGES_PUBLIC_PATH: /${{ github.event.repository.name }}/socratic/
        run: bun run build

      - name: Prepare GitHub Pages site (app at /socratic/)
        run: |
          mkdir -p deploy/socratic
          cp -r dist/. deploy/socratic/
          touch deploy/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
